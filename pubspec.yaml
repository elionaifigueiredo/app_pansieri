name: app_escritorio
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  path_provider: ^2.1.2
  open_filex: ^4.3.2
  url_launcher: ^6.2.5
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  sqflite: ^2.3.0
  path: ^1.9.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/splash_logo.png"



